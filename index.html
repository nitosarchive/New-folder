<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="features/script.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Typing Test</title>
  </head>
  <body>
    <label for="difficulty"></label>
    <select title="difficulty" id="option-container">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>

    <span id="time"></span>

    <main>
      <div class="overlay">
        <button id="start">start typing test</button>
        <span>Or click the text and start typing</span>
      </div>

      <div id="text" class="not-started"></div>
    </main>

    <span id="accuracy"></span>
    <span id="wpm"></span>
  </body>
</html>
